    experience:
      - company: Birch Scientific
        position: Software Developer and Computer Vision Researcher
        location:  "St John's, NL"
        start_date: 2024-04
        end_date: 2024-08
        highlights:
          - Collaborated in a team to develop a SaaS-based data visualization
            platform using React.js & PostgreSQL, enabling users to upload data, generate
            dynamic graphs, and 3D visualizations powered by
            Unreal Engine plugin.
          - Developed equations and algorithms for 3D mesh scale-space
            filtering using the Laplacian of Gaussian technique, utilizing
            VTK, Open3D, Trimesh, Gdist, and pygeodesic libraries for
            multiscale mesh visualization.
          - Implemented computationally intensive Scale Space Filtering (SSF)
            algorithms on NVIDIA GPUSs using CUDA, utilizing parallel programming
            techniques to significantly enhance processing speed and accuracy.
      - company: Blackberry
        position: Full Stack Software Developer
        location: Ottawa
        start_date: 2023-09
        end_date: 2023-12
        highlights:
          - Developed an internal test database tool “BlackFish” to store
            automated test results from various teams using .NET winForms to compare historical & 
            current test results.
          - Extended Blackfish capabilities with REST API functionality to query,
            view, monitor, upload and compare test results seamlessly.
          - Crafted unit and integration tests for Network Link Aggregation
            feature of QNX SDP 8.0 and authored shell scripts to automate processes on Jenkins.
      - company: Instrumar Limited
        position: Embedded Systems Software Developer
        location: St John's NL
        start_date: 2023-01
        end_date: 2023-05
        highlights:
          - Developed ST and ladder logic-based solutions for PLCs in
            accordance with client specifications and developed C++ code for 
            Instrumar sensors to accommodate new data streams.
          - Developed applications in GoLang & Java for upgraded Instrumar
            Fibre System. Assisted in the setup and deployment of Apache cloud
            stack for a kubernetes cluster based IFS system.
          - Wrote new drivers in .net/C# for linking the new ADS based
            communication protocol from Beckhoff with the Instrumar fibre
            system(IFS) and modified existing drivers for OPC use.
      - company: Information and Technology Services - MUN
        position: Network Software Developer
        location: St John's NL
        start_date: 2022-05
        end_date: 2023-08
        highlights:
          - Independently developed a UDP-based request tracking
            system with chat room functionality using low-level
            network programming in python with an interactive GUI.
          - Headed a team of talented computing support staff,
            providing software and hardware solutions to clients.
          - Designed & assembled circuits. Programmed microcontrollers 
            like Rasberry Pi Pico for internal projects.
    projects:
      - name: '[Open Source PDF Editor - BriskPDF](https://github.com/aryasalwan/ece5010)'
        highlights:
          - A cross-platform PDF editer with merge, split, insert, secure & invert pdf functionality developed in .NET MAUI.
      - name: '[MUN Class Schedule Exporter](https://chromewebstore.google.com/detail/class-schedule-exporter/ibokfibnpcllpcmoolbeoffkngmfghgm)'
        highlights:
          - Chrome based extension developed using webpack and ical.js, helps students to export 
            their class schedule directly to apple or google calendar. Has 10+ weekly users.
      - name: '[S&P500 Overbought & Oversold Stocks Analyser](https://github.com/aryasalwan/SnP500_RSI_calculator)'
        highlights:
          - Developed using yfinance, pandas and TA libraries
            in python. Gives buy/sell signal to user based on RSI.
    technologies:
